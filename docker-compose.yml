
services:

  # ─── PostgreSQL Database ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arifarm_db}
      POSTGRES_USER: ${POSTGRES_USER:-arifarm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arifarm_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-arifarm_db} -U ${POSTGRES_USER:-arifarm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Message Broker for Celery) ───────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Web Server ───────────────────────────────────────────
  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class gevent --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker (Background Tasks) ────────────────────────────
  celery:
    build: .
    restart: always
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Flower (Task Monitoring Dashboard) ───────────────────
  flower:
    build: .
    restart: always
    command: celery -A core flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-nitowallet123}
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - celery

volumes:
  postgres_data:
  static_volume:
